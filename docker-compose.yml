version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:14-alpine
    container_name: kantaka-db-local
    environment:
      POSTGRES_USER: kantaka_user
      POSTGRES_PASSWORD: local_password_dev
      POSTGRES_DB: kantaka_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kantaka_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kantaka-network

  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kantaka-backend-local
    environment:
      DATABASE_URL: postgresql://kantaka_user:local_password_dev@db:5432/kantaka_db
      ENVIRONMENT: development
      PYTHONUNBUFFERED: 1
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./contact_db.py:/app/contact_db.py
      - ./contact_route.py:/app/contact_route.py
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8080 --reload
    networks:
      - kantaka-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Flask Auth Service
  auth:
    build:
      context: ./services/kantaka-auth
      dockerfile: Dockerfile
    container_name: kantaka-auth-local
    environment:
      DATABASE_URL: postgresql://kantaka_user:local_password_dev@db:5432/kantaka_db
      ENVIRONMENT: development
      PYTHONUNBUFFERED: 1
      FLASK_ENV: development
      FLASK_DEBUG: 1
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./services/kantaka-auth:/app
    command: flask run --host 0.0.0.0 --port 5001
    networks:
      - kantaka-network

  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api
        NEXT_PUBLIC_SENTRY_DSN: ''
    container_name: kantaka-frontend-local
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api
      FLASK_AUTH_URL: http://localhost:5001
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - auth
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    command: npm run dev
    networks:
      - kantaka-network

  # Redis Cache (Optional)
  redis:
    image: redis:7-alpine
    container_name: kantaka-redis-local
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - kantaka-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:

networks:
  kantaka-network:
    driver: bridge
