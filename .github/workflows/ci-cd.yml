name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "22.22.3"

jobs:
  # ─── LINT & TYPE CHECK ───────────────────────────────────────
  lint-and-type-check:
    runs-on: ubuntu-latest
    name: Lint & Type Check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint --if-present || npx eslint src

      - name: Type check (TSC)
        run: npx tsc --noEmit

      - name: Check formatting (Prettier)
        run: npx prettier --check src || echo "Prettier check skipped"

  # ─── FRONTEND TESTS ──────────────────────────────────────────
  frontend-tests:
    runs-on: ubuntu-latest
    name: Frontend Tests
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test --if-present || echo "Tests not configured"

  # ─── SECURITY SCANNING ───────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    name: Security Scan
    needs: [lint-and-type-check, frontend-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run npm audit
        run: npm audit --audit-level=moderate || true

      - name: Run Semgrep (SAST)
        run: |
          pip install semgrep
          semgrep --config=p/security-audit src --json --output=semgrep-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: semgrep-report.json

  # ─── BUILD ───────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    name: Build Application
    needs: [frontend-tests, security-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

