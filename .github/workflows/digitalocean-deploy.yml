name: Deploy to DigitalOcean

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "22.22.3"
  PYTHON_VERSION: "3.10"

jobs:
  # ─── LINT & TYPE CHECK ───────────────────────────────────────
  lint-and-type-check:
    runs-on: ubuntu-latest
    name: Lint & Type Check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint --if-present || npx eslint src

      - name: Type check (TSC)
        run: npx tsc --noEmit

  # ─── FRONTEND TESTS ──────────────────────────────────────────
  frontend-tests:
    runs-on: ubuntu-latest
    name: Frontend Tests
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test --if-present || echo "Tests not configured"

  # ─── BACKEND TESTS ───────────────────────────────────────────
  backend-tests:
    runs-on: ubuntu-latest
    name: Backend Tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest pytest-cov

      - name: Run backend tests
        run: pytest backend/tests --cov=backend --cov-report=xml || echo "Tests not configured"

  # ─── SECURITY SCANNING ───────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    name: Security Scan
    needs: [lint-and-type-check, frontend-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run npm audit
        run: npm audit --audit-level=moderate || true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          pip install bandit semgrep

      - name: Run Bandit (Python security)
        run: bandit -r backend -f json -o bandit-report.json || true

      - name: Run Semgrep (SAST)
        run: semgrep --config=p/security-audit src backend --json --output=semgrep-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            semgrep-report.json

  # ─── BUILD ───────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    name: Build Application
    needs: [frontend-tests, backend-tests, security-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate backend imports
        run: python -c "import fastapi; from contact_db import save_contact_submission; from contact_route import router; print('✓ Backend OK')"

  # ─── DEPLOY TO DIGITALOCEAN ──────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to DigitalOcean
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Trigger DigitalOcean App Platform deployment
        run: |
          doctl apps create-deployment \
            --app-id ${{ secrets.DIGITALOCEAN_APP_ID }} \
            --format json

      - name: Wait for deployment
        run: |
          # Wait for deployment to complete (optional, for CI feedback)
          sleep 60
          doctl apps get ${{ secrets.DIGITALOCEAN_APP_ID }} --format ID,Name,Updated

      - name: Notify Slack (Optional)
        uses: slackapi/slack-github-action@v1
        if: always()
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Kantaka Deployment: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Kantaka Śodhana Deployment*\nStatus: `${{ job.status }}`\nCommit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                  }
                }
              ]
            }
