<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Kantaka Śodhana — Request Access</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --bg: #070a12; 
            --panel: #0d1220; 
            --text: #eaf0ff; 
            --muted: #a9b6dd;
            --accent: #6ee7ff; 
            --accent2: #8b5cf6; 
            --radius: 28px;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center; /* Centered horizontally */
        }

        /* --- IMMERSIVE BLOB BACKGROUND --- */
        #blobs {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 0;
            filter: blur(45px) contrast(1.4) saturate(1.2);
            opacity: 0.55;
        }

        /* --- HORIZONTAL REGISTRATION CARD --- */
        .reg-wrapper {
            position: relative;
            z-index: 10;
            width: min(900px, 95%); /* Wider for horizontal orientation */
        }

        .glass-card {
            background: rgba(13, 18, 32, 0.75);
            backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .back-link:hover { opacity: 0.8; transform: translateX(-3px); }

        h2 {
            font-size: 2.1rem;
            letter-spacing: -0.04em;
            margin: 0 0 8px;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            color: var(--muted);
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        /* Horizontal Form Layout */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Two columns */
            gap: 18px;
        }

        .full-width { grid-column: span 2; }

        input, textarea {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(110, 231, 255, 0.1);
        }

        textarea { min-height: 80px; resize: none; }

        .btn-row {
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #070a12;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(110, 231, 255, 0.25);
        }

        .login-note {
            font-size: 0.85rem;
            color: var(--muted);
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .btn-row { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

    <canvas id="blobs"></canvas>

    <div class="reg-wrapper">
        <div class="glass-card">
            <a href="{{ url_for('index') }}" class="back-link">
                <i class="fa-solid fa-arrow-left"></i> Back to Website
            </a>
            
            <h2>Secure Access Request</h2>
            <p class="subtitle">Complete the credentials below to request entry into the Kantaka Śodhana platform.</p>
            
            <form method="POST">
                <div class="form-grid">
                    <input type="text" name="username" placeholder="Full Name" required>
                    <input type="tel" name="phone" placeholder="Phone Number" required>
                    <input type="email" name="email" placeholder="Professional Email" required>
                    <input type="password" name="password" placeholder="Access Password" required>
                    <div class="full-width">
                        <textarea name="purpose" placeholder="Define your purpose of access (e.g., Forensic Audit, Academic Research)"></textarea>
                    </div>
                </div>

                <div class="btn-row">
                    <span class="login-note">Approved user? <a href="{{ url_for('login') }}" style="color: var(--accent); text-decoration: none; font-weight: 700;">Login</a></span>
                    <button class="btn" type="submit">Submit Request</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("blobs");
        const ctx = canvas.getContext("2d");
        let width, height, blobs;
        const BLOB_COUNT = 10;
        let mouse = { x: null, y: null, active: false };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resize);
        resize();

        class Blob {
            constructor(index) { this.reset(index); }
            reset(index) {
                const angle = (index / BLOB_COUNT) * Math.PI * 2;
                this.x = width / 2 + Math.cos(angle) * (width * 0.2);
                this.y = height / 2 + Math.sin(angle) * (height * 0.2);
                this.baseRadius = 130 + Math.random() * 70;
                this.radius = this.baseRadius;
                this.speed = 0.15 + Math.random() * 0.25;
                this.offset = Math.random() * 1000;
                this.hue = 195 + Math.random() * 80;
                this.vx = (Math.random() - 0.5) * 0.7;
                this.vy = (Math.random() - 0.5) * 0.7;
            }
            update(t) {
                this.x += this.vx; this.y += this.vy;
                if (this.x < -this.baseRadius || this.x > width + this.baseRadius) this.vx *= -1;
                if (this.y < -this.baseRadius || this.y > height + this.baseRadius) this.vy *= -1;
                this.radius = this.baseRadius * (0.9 + 0.1 * Math.sin((t * this.speed + this.offset) * 0.001));
                if (mouse.active) {
                    const dx = this.x - mouse.x; const dy = this.y - mouse.y;
                    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                    if (dist < 350) {
                        const force = (350 - dist) / 350;
                        this.x += (dx / dist) * force * 5; this.y += (dy / dist) * force * 5;
                    }
                }
            }
            draw() {
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 75%, 0.75)`);
                gradient.addColorStop(1, `hsla(${this.hue + 30}, 100%, 45%, 0)`);
                ctx.fillStyle = gradient;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
            }
        }

        function initBlobs() {
            blobs = [];
            for (let i = 0; i < BLOB_COUNT; i++) blobs.push(new Blob(i));
        }
        initBlobs();

        window.addEventListener("mousemove", (e) => { mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true; });

        function animate(t) {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, width, height);
            ctx.globalCompositeOperation = "screen";
            blobs.forEach((blob) => { blob.update(t); blob.draw(); });
        }
        requestAnimationFrame(animate);
    </script>
</body>
</html>
