<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divine Cyber Eye</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    background:radial-gradient(circle at center,#070712 0%,#000 75%);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Thunder flash */
.flash{
    position:absolute;
    inset:0;
    background:white;
    opacity:0;
    animation:flash 0.3s ease 2.8s forwards;
}

@keyframes flash{
    0%{opacity:0;}
    50%{opacity:.9;}
    100%{opacity:0;}
}

/* Screen shake */
@keyframes shake{
    0%{transform:translate(0)}
    25%{transform:translate(-6px,6px)}
    50%{transform:translate(6px,-6px)}
    75%{transform:translate(-4px,4px)}
    100%{transform:translate(0)}
}

.loader{
    width:380px;
    height:380px;
    position:relative;
    animation:shake .4s ease-in-out 2.8s 2;
}

/* SVG Neon Glow */
svg{
    width:100%;
    height:100%;
    filter:
        drop-shadow(0 0 10px #00f7ff)
        drop-shadow(0 0 20px #ff004c)
        drop-shadow(0 0 40px #00f7ff);
}

/* Triangle */
.triangle{
    fill:none;
    stroke:url(#cyber);
    stroke-width:3;
    stroke-dasharray:900;
    stroke-dashoffset:900;
    animation:drawTriangle 2s ease forwards;
}

@keyframes drawTriangle{
    to{stroke-dashoffset:0;}
}

/* Electric flow */
.pulse{
    stroke-dasharray:20 10;
    animation:electric 1s linear infinite;
}

@keyframes electric{
    to{stroke-dashoffset:-30;}
}

/* Eye Outline */
.eye-outline{
    fill:none;
    stroke:url(#cyber);
    stroke-width:2.5;
    opacity:0;
    animation:showEye 1s ease forwards;
    animation-delay:2s;
}

@keyframes showEye{
    to{opacity:1;}
}

/* Iris */
.iris{
    transform-origin:150px 150px;
    animation:rotateIris 6s linear infinite;
    opacity:0;
    animation-delay:3s;
    animation-fill-mode:forwards;
}

@keyframes rotateIris{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* Eyelids animation using clip-path */
.eye-group{
    clip-path:inset(45% 0 45% 0);
    animation:openEye 1.8s ease forwards;
    animation-delay:2.5s;
}

@keyframes openEye{
    to{clip-path:inset(0% 0 0% 0);}
}

</style>
</head>
<body>

<div class="flash"></div>

<div class="loader">

<svg viewBox="0 0 300 300">

<defs>
<linearGradient id="cyber" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00f7ff"/>
    <stop offset="100%" stop-color="#ff004c"/>
</linearGradient>
</defs>

<!-- Triangle -->
<path class="triangle pulse"
      d="M150 40 L260 240 L40 240 Z"/>

<!-- Eye -->
<g class="eye-group">

    <!-- Eye Outline -->
    <path class="eye-outline"
          d="M80 150 Q150 110 220 150 Q150 190 80 150 Z"/>

    <!-- Iris -->
    <circle class="iris"
            cx="150" cy="150" r="28"
            fill="none"
            stroke="url(#cyber)"
            stroke-width="3"/>

    <!-- Pupil -->
    <circle cx="150" cy="150" r="10"
            fill="#00f7ff"/>

</g>

</svg>
</div>

<!-- Thunder -->
<audio id="thunder" preload="auto">
<source src="https://assets.mixkit.co/active_storage/sfx/2515/2515-preview.mp3" type="audio/mpeg">
</audio>

<script>
setTimeout(()=>{
    document.getElementById("thunder").play();
},2800);
</script>

</body>
</html>
